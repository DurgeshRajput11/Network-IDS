apiVersion: apps/v1
kind: Deployment
metadata:
  name: ids-mlflow
  labels:
    app: ids-mlflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ids-mlflow
  template:
    metadata:
      labels:
        app: ids-mlflow
    spec:
      containers:
        - name: mlflow
          image: ghcr.io/mlflow/mlflow:v2.14.1
          ports:
            - containerPort: 5000
          args:
            - mlflow
            - server
            - --host
            - 0.0.0.0
            - --port
            - "5000"
---
apiVersion: v1
kind: Service
metadata:
  name: ids-mlflow
spec:
  selector:
    app: ids-mlflow
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
  type: ClusterIP

